<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediSort Robotic Simulation Core</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@400;600;700&display=swap');

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #fafafa;
      font-family: 'Poppins', sans-serif;
      color: #1a1a1a;
    }

    #hud-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 2px solid #f4f4f5;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.01);
      border-radius: 24px;
    }

    .hud-title {
      position: absolute;
      top: 16px;
      left: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #a1a1aa;
      opacity: 0.6;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(100% - 40px);
    }

    .hud-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 213, 107, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 213, 107, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* SVG styling */
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Animation effects */
    @keyframes laser-sweep {
      0%, 100% { transform: translateY(0px) scaleY(1); opacity: 0.7; }
      50% { transform: translateY(3px) scaleY(1.03); opacity: 0.9; }
    }

    .laser-active {
      animation: laser-sweep 0.2s infinite alternate;
    }

    .glowing-path {
      stroke-dasharray: 8, 8;
      animation: dash 5s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -80;
      }
    }

    .eye-pulse {
      animation: eye-glow 2s infinite alternate;
    }

    @keyframes eye-glow {
      0% { filter: drop-shadow(0 0 1px rgba(255, 213, 107, 0.5)); }
      100% { filter: drop-shadow(0 0 5px rgba(255, 213, 107, 0.9)); }
    }
  </style>
</head>

  <div id="hud-layer">
    <div class="hud-grid"></div>
    <div class="hud-title">MediSort Robocore v4.2 // CLASSIFIER MODULE</div>

        <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur2" />

          <feMergeNode in="blur1" />

  <script>
    // State Emojis mapped by Category
    const EMOJIS = {
      'Sharps/Needles': '💉',
      'Infectious': '🩸',
      'Pharmaceutical': '💊',
      'Pathological': '🦴',
      'Radioactive': '☢️',
      'Chemical/Hazardous': '🧪',
      'General/Non-hazardous': '📄',
      'Mixed/Hybrid': '🩹'
    };

    const SAMPLES = [
      { name: 'Used Syringe', cat: 'Sharps/Needles', icon: '💉' },
      { name: 'Blood Gauze', cat: 'Infectious', icon: '🩸' },
      { name: 'Expired Aspirin', cat: 'Pharmaceutical', icon: '💊' },
      { name: 'Hydrochloric Acid', cat: 'Chemical/Hazardous', icon: '🧪' },
      { name: 'Skeletal Remains', cat: 'Pathological', icon: '🦴' },
      { name: 'Cobalt-60', cat: 'Radioactive', icon: '☢️' },
      { name: 'Paper Towel', cat: 'General/Non-hazardous', icon: '📄' },
      { name: 'Contaminated Mixed Sharps', cat: 'Mixed/Hybrid', icon: '🩹' }
    ];

    const CATEGORY_COLORS = {
      'Infectious': '#FF7E7E',
      'Sharps/Needles': '#6BDBB2',
      'Pharmaceutical': '#7EA4FF',
      'Pathological': '#D884FF',
      'Radioactive': '#FFB84D',
      'Chemical/Hazardous': '#FFA500',
      'General/Non-hazardous': '#66C2FF',
      'Mixed/Hybrid': '#D97706'
    };

    // Locomotion global variables
    let currentMode = 'conveyor'; // 'conveyor' | 'locomotion'
    let scrollX = 0;
    let wheelRotation = 0;
    let fingerGap = 18;
    let locomotionState = 'moving'; // 'moving' | 'detecting' | 'picking' | 'grabbing' | 'depositing' | 'dropping' | 'returning'
    let activeItem = null;
    let targetAngles = { shoulder: -75, elbow: 100, wrist: 0, gap: 18 };
    let startAngles = { shoulder: -75, elbow: 100, wrist: 0, gap: 18 };
    let sequenceTimer = 0;
    let sequenceDuration = 0;

    const floorItems = [
      { id: 0, initialX: 480, name: 'Used Syringe', category: 'Sharps/Needles', color: '#6BDBB2', emoji: '💉', collected: false },
      { id: 1, initialX: 980, name: 'Expired Aspirin', category: 'Pharmaceutical', color: '#7EA4FF', emoji: '💊', collected: false },
      { id: 2, initialX: 1480, name: 'Hydrochloric Acid', category: 'Chemical/Hazardous', color: '#FFA500', emoji: '🧪', collected: false }
    ];

    function lerp(start, end, amt) {
      return (1 - amt) * start + amt * end;
    }

    function updateBackContainerFill() {
      const fillEl = document.getElementById('back-container-fill');
      if (fillEl) {
        const collectedCount = floorItems.filter(item => item.collected).length;
        const fillWidth = collectedCount * 13;
        fillEl.setAttribute('width', fillWidth);
      }
    }

    function startSequence(stateName, duration, target) {
      locomotionState = stateName;
      sequenceTimer = 0;
      sequenceDuration = duration;
      
      startAngles.shoulder = parseFloat(upperArmGroup.getAttribute('transform')?.replace('rotate(', '')?.replace(')', '') || -75);
      const elbowTransform = forearmGroup.getAttribute('transform') || '';
      const elbowMatch = elbowTransform.match(/rotate\(([^)]+)\)/);
      startAngles.elbow = elbowMatch ? parseFloat(elbowMatch[1]) : 100;
      
      const wristTransform = gripperGroup.getAttribute('transform') || '';
      const wristMatch = wristTransform.match(/rotate\(([^)]+)\)/);
      startAngles.wrist = wristMatch ? parseFloat(wristMatch[1]) : 0;
      
      startAngles.gap = fingerGap;
      targetAngles = target;
    }

    function setSimulationMode(mode) {
      currentMode = mode;
      const scanner = document.getElementById('scanner-group');
      const pedestal = document.getElementById('pedestal-base');
      const locoScene = document.getElementById('locomotion-scene');
      const wheeledBase = document.getElementById('wheeled-base');
      const backContainer = document.getElementById('back-container');
      
      if (mode === 'locomotion') {
        if (scanner) scanner.style.display = 'none';
        if (pedestal) pedestal.style.display = 'none';
        if (locoScene) locoScene.style.display = 'block';
        if (wheeledBase) wheeledBase.style.display = 'block';
        if (backContainer) backContainer.style.display = 'block';
        
        locomotionState = 'moving';
        scrollX = 0;
        
        // Reset floor items to original positions
        floorItems[0].initialX = 480;
        floorItems[0].name = 'Used Syringe';
        floorItems[0].category = 'Sharps/Needles';
        floorItems[0].color = '#6BDBB2';
        floorItems[0].emoji = '💉';
        floorItems[0].collected = false;

        floorItems[1].initialX = 980;
        floorItems[1].name = 'Expired Aspirin';
        floorItems[1].category = 'Pharmaceutical';
        floorItems[1].color = '#7EA4FF';
        floorItems[1].emoji = '💊';
        floorItems[1].collected = false;

        floorItems[2].initialX = 1480;
        floorItems[2].name = 'Hydrochloric Acid';
        floorItems[2].category = 'Chemical/Hazardous';
        floorItems[2].color = '#FFA500';
        floorItems[2].emoji = '🧪';
        floorItems[2].collected = false;

        floorItems.forEach(item => {
          const el = document.getElementById('floor-item-' + item.id);
          if (el) {
            el.style.display = 'block';
            el.setAttribute('transform', `translate(${item.initialX}, 500)`);
            const textEl = el.querySelector('text');
            if (textEl) textEl.textContent = item.emoji;
            const glowEl = el.querySelector('.item-glow');
            if (glowEl) {
              glowEl.setAttribute('stroke', item.color);
              glowEl.setAttribute('fill', item.color + '26');
            }
          }
        });
        updateBackContainerFill();
      } else {
        if (scanner) scanner.style.display = 'block';
        if (pedestal) pedestal.style.display = 'block';
        if (locoScene) locoScene.style.display = 'none';
        if (wheeledBase) wheeledBase.style.display = 'none';
        if (backContainer) backContainer.style.display = 'none';
        robotGroup.removeAttribute('transform');
      }
    }

    // Keep track of elements
    const upperArmGroup = document.getElementById('upper-arm-group');
    const forearmGroup = document.getElementById('forearm-group');
    const fingerTop = document.getElementById('finger-top');
    const fingerBottom = document.getElementById('finger-bottom');
    const heldItemGroup = document.getElementById('held-item-group');
    const heldItemBlock = document.getElementById('held-item-block');
    const heldItemEmoji = document.getElementById('held-item-emoji');
    const laserBeam = document.getElementById('laser-beam');
    const tabletStatus = document.getElementById('tablet-status');
    const tabletDetail = document.getElementById('tablet-detail');
    const eyeLeft = document.getElementById('led-eye-left');
    const eyeRight = document.getElementById('led-eye-right');
    const robotGroup = document.getElementById('humanoid-robot-group');
    const gripperGroup = document.getElementById('gripper-group');

    // Dynamically wrap, scale, and center the status text in the chest tablet screen to prevent text overflow and alignment issues
    function updateTabletStatus(text, phase) {
      if (!tabletStatus) return;
      tabletStatus.textContent = text;
      
      const maxWidth = 86;
      let fontSize = 12;
      tabletStatus.style.fontSize = fontSize + 'px';
      
      let textWidth = text.length * fontSize * 0.6;
      if (textWidth > maxWidth) {
        fontSize = maxWidth / (text.length * 0.6);
        if (fontSize < 7.5) fontSize = 7.5;
        tabletStatus.style.fontSize = fontSize + 'px';
      }
      
      const y = 358 + fontSize * 0.55;
      tabletStatus.setAttribute('y', y);

      // Map color theme dynamically based on state
      if (text === 'PENDING VERIFICATION' || text.includes('PICKING')) {
        tabletStatus.setAttribute('fill', '#ffb84d');
      } else if (phase === 'detecting' || text.includes('IDENTIFYING') || text.includes('LOCOMOTING')) {
        tabletStatus.setAttribute('fill', '#ffd56b');
      } else if (text.includes('SORTING') || text.includes('DROPPING')) {
        tabletStatus.setAttribute('fill', '#6bdbb2');
      } else {
        tabletStatus.setAttribute('fill', '#ffd56b');
      }
    }

    // Update LED eyes SVG shapes based on the robot phase (Yellow Theme)
    function updateRobotEyes(phase, phaseLabel) {
      let eyeSvg = '';
      if (phaseLabel === 'PENDING VERIFICATION') {
        eyeSvg = '<rect x="-2" y="-8" width="4" height="11" rx="2" fill="#ffd56b" filter="url(#yellow-glow)" /><circle cx="0" cy="6" r="2" fill="#ffd56b" filter="url(#yellow-glow)" />';
        eyeLeft.innerHTML = eyeSvg;
        eyeRight.innerHTML = eyeSvg;
      } else if (phase === 'detecting') {
        eyeSvg = '<rect x="-8" y="-1.5" width="16" height="3" rx="1.5" fill="#ffd56b" filter="url(#yellow-glow)" />';
        eyeLeft.innerHTML = eyeSvg;
        eyeRight.innerHTML = eyeSvg;
      } else if (phase === 'dropping' || phase === 'done') {
        eyeSvg = '<path d="M -8,3 C -8,-3 8,-3 8,3" fill="none" stroke="#ffd56b" stroke-width="3" stroke-linecap="round" filter="url(#yellow-glow)" />';
        eyeLeft.innerHTML = eyeSvg;
        eyeRight.innerHTML = eyeSvg;
      } else {
        eyeSvg = '<circle cx="0" cy="0" r="6" fill="#ffd56b" class="eye-pulse" filter="url(#yellow-glow)" />';
        eyeLeft.innerHTML = eyeSvg;
        eyeRight.innerHTML = eyeSvg;
      }
    }

    // Wrap and scale SVG text on the chest tablet to prevent text overflow and misalignment
    function updateTabletDetail(text) {
      const element = document.getElementById('tablet-detail');
      if (!element) return;
      
      element.innerHTML = ''; // clear existing tspans or text
      const cleanText = (text || '').trim();
      if (!cleanText) return;
      
      const maxWidth = 84; // max width allowed inside the tablet screen margins
      const cx = 390;
      const startY = 380;
      const lineHeight = 7.5;
      
      // Share Tech Mono character width is roughly 0.6 * font-size
      let fontSize = 7;
      element.style.fontSize = fontSize + 'px';
      
      let words = cleanText.split(' ');
      let lines = [];
      let currentLine = [];
      
      for (let n = 0; n < words.length; n++) {
        let testLine = currentLine.concat([words[n]]);
        let charWidth = fontSize * 0.6;
        let testWidth = testLine.join(' ').length * charWidth;
        if (testWidth > maxWidth && n > 0) {
          lines.push(currentLine.join(' '));
          currentLine = [words[n]];
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine.length > 0) {
        lines.push(currentLine.join(' '));
      }
      
      // If we have too many lines (e.g. more than 3), let's shrink the font size to 5.5px and recalculate
      if (lines.length > 3) {
        fontSize = 5.5;
        element.style.fontSize = fontSize + 'px';
        lines = [];
        currentLine = [];
        for (let n = 0; n < words.length; n++) {
          let testLine = currentLine.concat([words[n]]);
          let charWidth = fontSize * 0.6;
          let testWidth = testLine.join(' ').length * charWidth;
          if (testWidth > maxWidth && n > 0) {
            lines.push(currentLine.join(' '));
            currentLine = [words[n]];
          } else {
            currentLine = testLine;
          }
        }
        if (currentLine.length > 0) {
          lines.push(currentLine.join(' '));
        }
      }
      
      // If still too long, truncate to 3 lines with ellipsis
      if (lines.length > 3) {
        lines = lines.slice(0, 3);
        lines[2] = lines[2].slice(0, -3) + '...';
      }
      
      // Calculate start Y to vertically center the lines inside the bottom text area (Y=370 to Y=392)
      const totalHeight = (lines.length - 1) * lineHeight;
      let y = 381 - (totalHeight / 2) + 2.5; // adjust for text baseline
      
      lines.forEach(lineText => {
        const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        tspan.setAttribute('x', cx);
        tspan.setAttribute('y', y);
        tspan.textContent = lineText;
        element.appendChild(tspan);
        y += lineHeight;
      });
    }

    // Process and render status changes in the dashboard
    function updateRobotState(state) {
      if (typeof state.baseRotation === 'number') {
        robotGroup.setAttribute('transform', `rotate(${state.baseRotation}, 390, 540)`);
      }

      if (state.armAngles) {
        upperArmGroup.setAttribute('transform', `rotate(${state.armAngles.shoulder})`);
        forearmGroup.setAttribute('transform', `translate(200, 0) rotate(${state.armAngles.elbow})`);
      }

      if (typeof state.wristAngle === 'number') {
        gripperGroup.setAttribute('transform', `translate(180, 0) rotate(${state.wristAngle})`);
      }

      if (typeof state.fingerGap === 'number') {
        const gap = state.fingerGap;
        fingerTop.setAttribute('d', `M 0 ${-gap-8} L 36 ${-gap-8} L 36 ${-gap}`);
        fingerBottom.setAttribute('d', `M 0 ${gap+8} L 36 ${gap+8} L 36 ${gap}`);
      }

      if (state.heldItem) {
        heldItemBlock.setAttribute('fill', state.heldItem.color);
        heldItemEmoji.textContent = state.heldItem.emoji || EMOJIS[state.heldItem.id] || '📦';
        
        heldItemGroup.style.opacity = state.itemOpacity;
        heldItemGroup.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s';
        
        if (state.itemDrop) {
          heldItemGroup.style.transform = `scale(${state.itemScale}) translateY(120px)`;
        } else {
          heldItemGroup.style.transform = `scale(${state.itemScale})`;
        }
      } else {
        heldItemGroup.style.opacity = '0';
      }

      if (state.phase === 'detecting' && (state.elapsed || 0) >= 1000) {
        laserBeam.style.opacity = '1';
        laserBeam.classList.add('laser-active');
      } else {
        laserBeam.style.opacity = '0';
        laserBeam.classList.remove('laser-active');
      }

      if (state.phaseLabel) {
        updateTabletStatus(state.phaseLabel, state.phase);
      }
      
      if (state.resultData && state.resultData.name) {
        updateTabletDetail(state.resultData.name.toUpperCase());
      } else {
        updateTabletDetail('ROBOTIC CORE ONLINE');
      }

      updateRobotEyes(state.phase, state.phaseLabel);
    }

    // Locomotion update function
    function updateLocomotion(dt) {
      if (locomotionState === 'moving') {
        scrollX += 0.08 * dt;
        wheelRotation += 0.19 * dt;
        
        // Loop the scrolling corridor background seamlessly
        // Width of the repeating pattern is 2000px
        if (scrollX >= 2000) {
          scrollX -= 2000;
          floorItems.forEach(item => {
            item.initialX -= 2000;
            const el = document.getElementById('floor-item-' + item.id);
            if (el) {
              el.setAttribute('transform', `translate(${item.initialX}, 500)`);
            }
          });
        }
        
        document.getElementById('wheel-left').setAttribute('transform', `translate(330, 575) rotate(${wheelRotation})`);
        document.getElementById('wheel-right').setAttribute('transform', `translate(450, 575) rotate(${wheelRotation})`);
        
        // Apply parallax scrolling translation:
        // Foreground moves at full speed
        document.getElementById('scrolling-corridor').setAttribute('transform', `translate(${-scrollX}, 0)`);
        // Background moves at 40% speed
        const bgScrollX = scrollX * 0.4;
        document.getElementById('corridor-bg-parallax').setAttribute('transform', `translate(${-bgScrollX}, 0)`);
        
        // Humanoid chassis suspension bobbing micro-animation
        const bobY = Math.sin(scrollX * 0.05) * 1.5;
        robotGroup.setAttribute('transform', `translate(0, ${bobY})`);
        
        upperArmGroup.setAttribute('transform', 'rotate(-75)');
        forearmGroup.setAttribute('transform', 'translate(200, 0) rotate(100)');
        gripperGroup.setAttribute('transform', 'translate(180, 0) rotate(0)');
        fingerTop.setAttribute('d', 'M 0 -26 L 36 -26 L 36 -18');
        fingerBottom.setAttribute('d', 'M 0 26 L 36 26 L 36 18');
        heldItemGroup.style.opacity = '0';
        
        updateTabletStatus('LOCOMOTING', 'locomoting');
        updateTabletDetail('HEURISTICS RUNNING');
        updateRobotEyes('idle', 'LOCOMOTING');
        
        // Respawn items that have scrolled off-screen to the left
        floorItems.forEach(item => {
          const relX = item.initialX - scrollX;
          if (relX < -100) {
            const spawnRelX = 850 + Math.random() * 350;
            item.initialX = scrollX + spawnRelX;
            item.collected = false;
            
            // Randomize specimen details
            const sample = SAMPLES[Math.floor(Math.random() * SAMPLES.length)];
            item.name = sample.name;
            item.category = sample.cat;
            item.emoji = sample.icon;
            item.color = CATEGORY_COLORS[sample.cat] || '#FFFFFF';
            
            const el = document.getElementById('floor-item-' + item.id);
            if (el) {
              el.style.display = 'block';
              el.setAttribute('transform', `translate(${item.initialX}, 500)`);
              
              const textEl = el.querySelector('text');
              if (textEl) textEl.textContent = item.emoji;
              
              const glowEl = el.querySelector('.item-glow');
              if (glowEl) {
                glowEl.setAttribute('stroke', item.color);
                glowEl.setAttribute('fill', item.color + '26');
              }
            }
          }
        });
        
        // Check for pickups
        for (let item of floorItems) {
          if (!item.collected) {
            const relX = item.initialX - scrollX;
            if (relX >= 405 && relX <= 415) {
              activeItem = item;
              startSequence('detecting', 1200, { shoulder: -75, elbow: 100, wrist: 0, gap: 18 });
              break;
            }
          }
        }
      } else {
        sequenceTimer += dt;
        let progress = Math.min(1, sequenceTimer / sequenceDuration);
        
        const currentShoulder = lerp(startAngles.shoulder, targetAngles.shoulder, progress);
        const currentElbow = lerp(startAngles.elbow, targetAngles.elbow, progress);
        const currentWrist = lerp(startAngles.wrist, targetAngles.wrist, progress);
        fingerGap = lerp(startAngles.gap, targetAngles.gap, progress);
        
        upperArmGroup.setAttribute('transform', `rotate(${currentShoulder})`);
        forearmGroup.setAttribute('transform', `translate(200, 0) rotate(${currentElbow})`);
        gripperGroup.setAttribute('transform', `translate(180, 0) rotate(${currentWrist})`);
        
        fingerTop.setAttribute('d', `M 0 ${-fingerGap-8} L 36 ${-fingerGap-8} L 36 ${-fingerGap}`);
        fingerBottom.setAttribute('d', `M 0 ${fingerGap+8} L 36 ${fingerGap+8} L 36 ${fingerGap}`);
        
        if (locomotionState === 'detecting') {
          const laser = document.getElementById('locomotion-laser-beam');
          if (laser) {
            laser.style.opacity = '1';
            laser.classList.add('laser-active');
          }
          
          updateTabletStatus('IDENTIFYING', 'detecting');
          updateTabletDetail(activeItem.name.toUpperCase());
          updateRobotEyes('detecting', 'IDENTIFYING');
          
          if (progress >= 1) {
            if (laser) {
              laser.style.opacity = '0';
              laser.classList.remove('laser-active');
            }
            startSequence('picking', 1000, { shoulder: -204, elbow: -119, wrist: -30, gap: 18 });
          }
        } 
        else if (locomotionState === 'picking') {
          updateTabletStatus('PICKING', 'picking');
          updateRobotEyes('picking', 'PICKING');
          
          if (progress >= 1) {
            startSequence('grabbing', 400, { shoulder: -204, elbow: -119, wrist: -30, gap: 4 });
          }
        } 
        else if (locomotionState === 'grabbing') {
          if (progress >= 1) {
            heldItemBlock.setAttribute('fill', activeItem.color);
            heldItemEmoji.textContent = activeItem.emoji;
            heldItemGroup.style.opacity = '1';
            heldItemGroup.style.transform = 'scale(0.3)';
            
            const el = document.getElementById('floor-item-' + activeItem.id);
            if (el) el.style.display = 'none';
            
            startSequence('depositing', 1500, { shoulder: -230, elbow: -40, wrist: 30, gap: 4 });
          }
        } 
        else if (locomotionState === 'depositing') {
          updateTabletStatus('SORTING', 'dropping');
          updateRobotEyes('dropping', 'SORTING');
          
          if (progress >= 1) {
            startSequence('dropping', 500, { shoulder: -230, elbow: -40, wrist: 30, gap: 18 });
            
            heldItemGroup.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s';
            heldItemGroup.style.transform = 'scale(0.3) translateY(80px)';
            heldItemGroup.style.opacity = '0';
            
            window.parent.postMessage({
              type: 'LOCOMOTION_SORT_COMPLETE',
              item: { name: activeItem.name, category: activeItem.category }
            }, '*');
            
            activeItem.collected = true;
            updateBackContainerFill();
          }
        } 
        else if (locomotionState === 'dropping') {
          if (progress >= 1) {
            startSequence('returning', 1000, { shoulder: -75, elbow: 100, wrist: 0, gap: 18 });
          }
        } 
        else if (locomotionState === 'returning') {
          if (progress >= 1) {
            locomotionState = 'moving';
          }
        }
      }
    }

    // Save latest state to drive local conveyor animations
    let latestState = null;
    let conveyorScrollX = 0;
    let pulleyRotation = 0;

    function updateConveyorAnimation(dt) {
      if (!latestState) return;

      const phase = latestState.phase;
      const elapsed = latestState.elapsed || 0;
      const phaseLabel = latestState.phaseLabel || '';

      const dumpLaser = document.getElementById('dump-laser-beam');
      const convSpec = document.getElementById('conveyor-specimen');
      const conveyorBelt = document.getElementById('conveyor-belt-line');
      const convEmoji = document.getElementById('conv-item-emoji');
      const convGlow = document.getElementById('conv-item-glow');

      // Resolve the active item's emoji and color from parent state
      let activeItemData = null;
      if (latestState.heldItem) {
        activeItemData = {
          emoji: latestState.heldItem.emoji || EMOJIS[latestState.heldItem.id] || '📦',
          color: latestState.heldItem.color || '#cbd5e1'
        };
      } else if (latestState.pendingResult) {
        activeItemData = {
          emoji: SAMPLES.find(s => s.name === latestState.pendingResult.name)?.icon || EMOJIS[latestState.pendingResult.category.id] || '📦',
          color: latestState.pendingResult.category.color || '#cbd5e1'
        };
      } else if (latestState.selectedPresetName) {
        const sample = SAMPLES.find(s => s.name === latestState.selectedPresetName);
        if (sample) {
          activeItemData = {
            emoji: sample.icon,
            color: CATEGORY_COLORS[sample.cat] || '#cbd5e1'
          };
        }
      }

      if (convSpec && activeItemData) {
        if (convEmoji) convEmoji.textContent = activeItemData.emoji;
        if (convGlow) {
          convGlow.setAttribute('stroke', activeItemData.color);
          convGlow.setAttribute('fill', activeItemData.color + '26');
        }
      }

      let isBeltMoving = false;
      let showDumpLaser = false;
      let itemX = 45;
      let itemOpacity = 0;

      if (phase === 'detecting') {
        if (elapsed < 1000) {
          // Phase 1: Item rolls from waste dump (X=45) to scanner bed (X=110)
          isBeltMoving = true;
          showDumpLaser = true;
          itemOpacity = 1;
          const t = Math.min(1, elapsed / 1000);
          itemX = lerp(45, 110, t);
        } else {
          // Phase 2: Item sits on conveyor deck scanner bed (X=110) being scanned
          isBeltMoving = false;
          showDumpLaser = false;
          itemOpacity = 1;
          itemX = 110;
        }
      } else if (phase === 'picking' || phaseLabel === 'PENDING VERIFICATION' || phaseLabel === 'SUPERVISOR HOLD') {
        // Item remains on conveyor deck scanner bed until picked up
        isBeltMoving = false;
        showDumpLaser = false;
        itemOpacity = 1;
        itemX = 110;
      } else if (phase === 'transporting' || phase === 'dropping') {
        // Item is in robot arm; hide conveyor specimen
        isBeltMoving = false;
        showDumpLaser = false;
        itemOpacity = 0;
        itemX = 110;
      } else {
        // Idle / Done / Returning
        isBeltMoving = false;
        showDumpLaser = false;
        itemOpacity = 0;
        itemX = 45;
      }

      // Smoothly animate belt and pulleys when running
      if (isBeltMoving) {
        conveyorScrollX = (conveyorScrollX - 0.1 * dt) % 12;
        pulleyRotation = (pulleyRotation + 0.3 * dt) % 360;
      }

      const spoke1 = document.getElementById('pulley-spokes-1');
      const spoke2 = document.getElementById('pulley-spokes-2');
      const spoke3 = document.getElementById('pulley-spokes-3');
      if (spoke1) spoke1.setAttribute('transform', `translate(60, 372) rotate(${pulleyRotation})`);
      if (spoke2) spoke2.setAttribute('transform', `translate(110, 372) rotate(${pulleyRotation})`);
      if (spoke3) spoke3.setAttribute('transform', `translate(160, 372) rotate(${pulleyRotation})`);

      if (conveyorBelt) {
        conveyorBelt.setAttribute('stroke-dashoffset', conveyorScrollX);
      }

      if (convSpec) {
        convSpec.setAttribute('transform', `translate(${itemX}, 345)`);
        convSpec.style.opacity = itemOpacity;
        convSpec.style.display = itemOpacity > 0 ? 'block' : 'none';
      }

      if (dumpLaser) {
        if (showDumpLaser) {
          dumpLaser.style.opacity = '1';
          const sweep = Math.sin(Date.now() * 0.015) * 12;
          dumpLaser.setAttribute('points', `42,202 ${15 + sweep},350 ${70 + sweep},350`);
        } else {
          dumpLaser.style.opacity = '0';
        }
      }
    }

    // Message listener from React Parent App
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'UPDATE_ROBOT_STATE') {
        const state = event.data.state;
        latestState = state;
        if (state.simulationMode && state.simulationMode !== currentMode) {
          setSimulationMode(state.simulationMode);
        }
        if (currentMode === 'conveyor') {
          updateRobotState(state);
        }
      }
    });

    // Start animation loop
    let lastTime = 0;
    function animationLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = Math.min(50, timestamp - lastTime);
      lastTime = timestamp;
      
      if (currentMode === 'locomotion') {
        updateLocomotion(dt);
      } else if (currentMode === 'conveyor') {
        updateConveyorAnimation(dt);
      }
      
      requestAnimationFrame(animationLoop);
    }
    requestAnimationFrame(animationLoop);

    // Notify React Parent upon loading to request current system state
    window.parent.postMessage({ type: 'REQUEST_INITIAL_STATE' }, '*');
  </script>
</body>
